name: HACS Action

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  hacs:
    name: HACS Action
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: HACS Action
        uses: "hacs/action@main"
        with:
          category: "integration"
          # 'brands' requires the domain to be registered in home-assistant/brands;
          # ignore until a brands PR is submitted. See README for the follow-up.
          ignore: "brands"
